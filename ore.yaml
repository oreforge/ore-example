network: example

gitops:
  webhook:
    enabled: true
    force: true
    no_cache: true
  poll:
    enabled: false
    interval: 1m

servers:
  - name: lobby
    dir: ./servers/lobby
    software: paper:26.1.1
    memory: 1G
    jvmFlags: [-Xms512M, -Xmx1G]

  - name: survival
    dir: ./servers/survival
    software: paper:26.1.1
    memory: 2G
    jvmFlags: [-Xms1G, -Xmx2G]
    volumes:
      - name: world
        target: /data/world

  - name: proxy
    dir: ./servers/proxy
    software: gate:0.64.0
    ports:
      - "25565:25565"
    memory: 512M

services:
  - name: database
    image: postgres:16
    ports:
      - "5432:5432"
    env:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: example
    volumes:
      - name: data
        target: /var/lib/postgresql/data
