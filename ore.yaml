network: example

gitops:
  webhook:
    enabled: true
    force: true
    noCache: true
  poll:
    enabled: true
    interval: 1m

servers:
  - name: lobby
    dir: ./servers/lobby
    software: paper:1.21.11
    memory: 1G

  - name: survival
    dir: ./servers/survival
    software: paper:1.21.11
    memory: 2G
    volumes:
      - name: world
        target: /data/world
    healthcheck:
      retries: 60
      startPeriod: 10s

  - name: proxy
    dir: ./servers/proxy
    software: gate:0.64.0
    ports:
      - "25565:25565"
    memory: 512M
    healthcheck: "nc -z localhost 25565"

services:
  - name: database
    image: postgres:16
    ports:
      - "5432:5432"
    env:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: example
    volumes:
      - name: data
        target: /var/lib/postgresql/data
    healthcheck:
      cmd: "pg_isready -U postgres"
      interval: 10s
      timeout: 5s
      startPeriod: 30s
      retries: 5
